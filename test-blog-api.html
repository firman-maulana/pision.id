<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Blog API</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .status {
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 8px;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .blog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        .blog-card {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .blog-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        .blog-content {
            padding: 15px;
        }
        .blog-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .blog-meta {
            font-size: 12px;
            color: #666;
            margin-bottom: 10px;
        }
        .blog-desc {
            font-size: 14px;
            color: #333;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <h1>Test Blog API Integration</h1>
    <div id="status" class="status">Loading...</div>
    <div id="blog-grid" class="blog-grid"></div>

    <script>
        const API_URL = 'https://adm.createch.id/getartikel';
        const statusEl = document.getElementById('status');
        const gridEl = document.getElementById('blog-grid');

        async function testAPI() {
            try {
                statusEl.textContent = 'Fetching data from API...';
                
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                
                const result = await response.json();
                const blogs = result.data || result.blogs || result || [];
                
                statusEl.className = 'status success';
                statusEl.textContent = `✓ Success! Loaded ${blogs.length} blog articles from API`;
                
                if (blogs.length === 0) {
                    gridEl.innerHTML = '<p>No blogs found</p>';
                    return;
                }
                
                gridEl.innerHTML = blogs.map(blog => `
                    <div class="blog-card">
                        <img src="${blog.gambar || 'images/ns-img-428.png'}" 
                             alt="${blog.judul || 'Blog'}"
                             onerror="this.src='images/ns-img-428.png'">
                        <div class="blog-content">
                            <div class="blog-title">${blog.judul || 'Untitled'}</div>
                            <div class="blog-meta">
                                ${blog.penulis || 'Admin'} • ${blog.tanggal || 'No date'}
                            </div>
                            <div class="blog-desc">
                                ${(blog.deskripsi || '').substring(0, 150)}...
                            </div>
                        </div>
                    </div>
                `).join('');
                
            } catch (error) {
                statusEl.className = 'status error';
                statusEl.textContent = `✗ Error: ${error.message}`;
                console.error('API Error:', error);
            }
        }

        testAPI();
    </script>
</body>
</html>
